<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP LUCKY BOX</title>
    <style>
        /* 1. 배경화면 최적화 (사장님이 만든 레드 네온 이미지 배경) */
        body { 
            background: #000 url('여기에_아까_만든_이미지_링크_입력') no-repeat center center; 
            background-size: cover; color: #fff; font-family: -apple-system, sans-serif; 
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; 
        }
        /* 배경이 너무 밝으면 글자가 안 보이니 어둡게 처리 */
        body::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: -1; }

        .container { text-align: center; padding: 20px; width: 100%; max-width: 400px; z-index: 1; }
        
        /* 버튼 애니메이션 강화 */
        .lucky-btn { 
            background: linear-gradient(45deg, #ff0000, #8b0000); 
            color: #fff; border: none; padding: 25px 0; width: 100%; 
            font-size: 26px; font-weight: bold; border-radius: 15px; 
            cursor: pointer; box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            transition: 0.3s; animation: pulse 1.2s infinite;
        }
        .lucky-btn:disabled { background: #333; color: #777; box-shadow: none; animation: none; cursor: not-allowed; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* 2. 당첨 애니메이션 (로딩 바) */
        #loading-area { display: none; margin-top: 20px; }
        .loader { border: 4px solid #333; border-top: 4px solid #ff0000; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .info { margin-top: 30px; color: #ccc; font-size: 14px; line-height: 1.6; }
        .video-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 100; }
        
        /* 3. 끄기 버튼 숨기기 관련 */
        #close-btn { 
            position: absolute; top: 20px; right: 20px; display: none; 
            background: rgba(255,255,255,0.2); border: none; color: #fff; 
            padding: 10px 15px; border-radius: 50%; font-size: 20px; cursor: pointer; 
        }
    </style>
</head>
<body>
    <div id="main-content" class="container">
        <h1 id="title" style="margin-bottom: 40px; color: #ff0000; text-shadow: 0 0 15px #ff0000;">🎁 VIP LUCKY BOX</h1>
        
        <button id="main-btn" class="lucky-btn" onclick="startLucky()"> 🔓 상자 열기 </button>
        
        <div id="loading-area">
            <div class="loader"></div>
            <p style="margin-top:15px; color:#ff0000; font-weight:bold;">당첨 확인 중...</p>
        </div>

        <div id="info-text" class="info">
            오늘의 시크릿 행운을 확인하세요!<br>
            <small style="opacity: 0.5;">이 포스팅은 쿠팡 파트너스 활동의 일환으로 수수료를 제공받을 수 있습니다.</small>
        </div>
    </div>

    <script>
        const videoLinks = 
            [ 
                "https://image2url.com/r2/default/videos/1773757057551-2b5fe024-98af-4ad6-ad62-a233ca83f3e2.mp4",
                "https://image2url.com/r2/default/videos/1773757406771-8c34d23e-5d10-4f08-aeae-0f58f5bf1c93.mp4",
                "https://image2url.com/r2/default/videos/1773757454966-dabbda65-27f1-4846-bf98-1984d3cf37ad.mp4",
            ];
        const adLinks = [ "https://link.coupang.com/a/dLXD5X", "https://link.coupang.com/a/dN4QKg" ];

        // 4. 뒤로가기 방지 로직 (가두기)
        history.pushState(null, null, location.href);
        window.onpopstate = function() {
            history.pushState(null, null, location.href);
            alert("잠깐! 아직 확인하지 않은 선물이 있습니다. 한 번 더 도전하세요!");
        };

        // 참여 제한 로직 (기존 유지 + UI 연동)
        function checkLimit() {
            const today = new Date().toDateString();
            const lastDate = localStorage.getItem('lastDate');
            if (lastDate !== today) {
                const randomLimit = Math.floor(Math.random() * 4) + 7; 
                localStorage.setItem('lastDate', today);
                localStorage.setItem('dailyLimit', randomLimit);
                localStorage.setItem('clickCount', '0');
            }
            let limit = parseInt(localStorage.getItem('dailyLimit'));
            let count = parseInt(localStorage.getItem('clickCount'));

            if (count >= limit) {
                // 5. "내일 다시 도전하세요" 문구 적용
                document.getElementById('main-btn').innerText = "내일 다시 도전하세요";
                document.getElementById('main-btn').disabled = true;
                document.getElementById('info-text').innerHTML = "오늘의 참여 횟수를 모두 소모했습니다.<br>광고 확인 후 내일 다시 찾아주세요!";
                return false;
            }
            localStorage.setItem('clickCount', count + 1);
            return true;
        }

        function startLucky() {
            if (!checkLimit()) {
                // 한도 초과 시에도 클릭하면 광고로 보내기
                setTimeout(() => { window.location.href = adLinks[Math.floor(Math.random() * adLinks.length)]; }, 1000);
                return;
            }

            // 당첨 애니메이션 실행
            const btn = document.getElementById('main-btn');
            const loading = document.getElementById('loading-area');
            btn.style.display = 'none';
            loading.style.display = 'block';

            setTimeout(() => {
                const rand = Math.random();
                if (rand < 0.5) { // 6. 확률 5:5 조정
                    playVideo(videoLinks[Math.floor(Math.random() * videoLinks.length)]);
                } else {
                    window.location.href = adLinks[Math.floor(Math.random() * adLinks.length)];
                }
            }, 1500); // 1.5초 로딩 후 결과 노출
        }

        function playVideo(url) {
            document.getElementById('main-content').style.display = 'none';
            let overlay = document.createElement('div');
            overlay.className = 'video-overlay';
            overlay.innerHTML = `
                <video id="luckyVideo" autoplay playsinline muted style="width:100%; height:100%;">
                    <source src="${url}" type="video/mp4">
                </video>
                <button id="close-btn" onclick="location.reload()">✕</button>
            `;
            document.body.appendChild(overlay);

            const video = document.getElementById('luckyVideo');
            
            // 7. 끄기 버튼 5초간 숨기기 로직
            setTimeout(() => {
                document.getElementById('close-btn').style.display = 'block';
            }, 5000); // 5초 뒤에 닫기 버튼 등장

            video.onended = () => { location.reload(); };
        }
    </script>
</body>
</html>
