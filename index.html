<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP LUCKY BOX</title>
    <style>
        body { 
            background: #000 url('https://raw.githubusercontent.com/hajin1004/abc/main/bg.png') no-repeat center center; 
            background-size: cover; color: #fff; font-family: -apple-system, sans-serif; 
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; 
        }
        body::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: -1; }

        .container { text-align: center; padding: 20px; width: 100%; max-width: 400px; z-index: 1; }
        
        .lucky-btn { 
            background: linear-gradient(45deg, #ff0000, #8b0000); 
            color: #fff; border: none; padding: 25px 0; width: 100%; 
            font-size: 26px; font-weight: bold; border-radius: 15px; 
            cursor: pointer; box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            transition: 0.3s; animation: pulse 1.2s infinite;
        }
        .lucky-btn:disabled { background: #333; color: #777; box-shadow: none; animation: none; cursor: not-allowed; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #loading-area { display: none; margin-top: 20px; }
        .loader { border: 4px solid #333; border-top: 4px solid #ff0000; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .info { margin-top: 30px; color: #ccc; font-size: 14px; line-height: 1.6; }

        /* 영상 레이어 */
        #video-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; display: none; align-items: center; justify-content: center; 
            z-index: 99999;
        }
        
        /* ✕ 버튼 초기 상태: 무조건 숨김(none) */
        #close-btn { 
            position: absolute; top: 30px; right: 30px; display: none; 
            background: rgba(255,255,255,0.3); border: 2px solid #fff; color: #fff; 
            width: 55px; height: 55px; border-radius: 50%; font-size: 28px; 
            font-weight: bold; cursor: pointer; z-index: 100000;
            align-items: center; justify-content: center;
        }

        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <div id="main-content" class="container">
        <h1 style="margin-bottom: 40px; color: #ff0000; text-shadow: 0 0 15px #ff0000;">🎁 LUCKY BOX</h1>
        <button id="main-btn" class="lucky-btn" onclick="startLucky()"> 🔓 상자 열기 </button>
        <div id="loading-area">
            <div class="loader"></div>
            <p style="margin-top:15px; color:#ff0000; font-weight:bold;">당첨 정보 확인 중...</p>
        </div>
        <div class="info">
            오늘의 시크릿 행운을 확인하세요!<br>
            <small style="opacity: 0.5;">본 페이지는 성인 인증 및 보안 연결을 지원합니다.</small>
        </div>
    </div>

    <div id="video-overlay">
        <video id="luckyVideo" playsinline muted>
            <source src="" type="video/mp4">
        </video>
        <div id="close-btn" onclick="stopAndClose()">✕</div>
    </div>

    <script>
        const videoLinks = [ 
            "https://image2url.com/r2/default/videos/1773757057551-2b5fe024-98af-4ad6-ad62-a233ca83f3e2.mp4",
            "https://image2url.com/r2/default/videos/1773757406771-8c34d23e-5d10-4f08-aeae-0f58f5bf1c93.mp4",
            "https://image2url.com/r2/default/videos/1773757454966-dabbda65-27f1-4846-bf98-1984d3cf37ad.mp4"
        ];
        const adLinks = [ "https://link.coupang.com/a/dLXD5X", "https://link.coupang.com/a/dN4QKg" ];

        function startLucky() {
            const btn = document.getElementById('main-btn');
            const loading = document.getElementById('loading-area');
            btn.style.display = 'none';
            loading.style.display = 'block';

            setTimeout(() => {
                const rand = Math.random();
                if (rand < 0.5) { 
                    showVideo(videoLinks[Math.floor(Math.random() * videoLinks.length)]);
                } else {
                    window.location.href = adLinks[Math.floor(Math.random() * adLinks.length)];
                }
            }, 1800); 
        }

        function showVideo(url) {
            const overlay = document.getElementById('video-overlay');
            const video = document.getElementById('luckyVideo');
            const closeBtn = document.getElementById('close-btn');

            // 1. 영상 세팅 및 재생
            video.src = url;
            overlay.style.display = 'flex';
            closeBtn.style.display = 'none'; // 재생 직후에는 다시 한번 버튼 숨김 강제
            video.load();
            video.play();

            // 2. [핵심] 정확히 5초 뒤에 ✕ 버튼 등장시키기
            setTimeout(() => { 
                closeBtn.style.setProperty('display', 'flex', 'important'); 
            }, 5000); // 5000ms = 5초

            video.onended = stopAndClose;
        }

        function stopAndClose() {
            const overlay = document.getElementById('video-overlay');
            const video = document.getElementById('luckyVideo');
            const closeBtn = document.getElementById('close-btn');

            video.pause();
            video.src = "";
            video.load();

            overlay.style.display = 'none';
            closeBtn.style.display = 'none'; // 닫을 때 버튼 다시 숨기기

            document.getElementById('main-content').style.display = 'block';
            document.getElementById('main-btn').style.display = 'block';
            document.getElementById('loading-area').style.display = 'none';
        }
    </script>
</body>
</html>
